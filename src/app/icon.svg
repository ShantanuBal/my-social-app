<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Vertical bar -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Horizontal bar -->
  <line x1="3" y1="16" x2="29" y2="16" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal 1 -->
  <line x1="7" y1="7" x2="25" y2="25" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal 2 -->
  <line x1="25" y1="7" x2="7" y2="25" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#ffffff"/>
  <!-- Tips -->
  <circle cx="16" cy="4" r="1.5" fill="#a78bfa"/>
  <circle cx="16" cy="28" r="1.5" fill="#a78bfa"/>
  <circle cx="4" cy="16" r="1.5" fill="#a78bfa"/>
  <circle cx="28" cy="16" r="1.5" fill="#a78bfa"/>
  <circle cx="7.5" cy="7.5" r="1.5" fill="#60a5fa"/>
  <circle cx="24.5" cy="7.5" r="1.5" fill="#60a5fa"/>
  <circle cx="7.5" cy="24.5" r="1.5" fill="#60a5fa"/>
  <circle cx="24.5" cy="24.5" r="1.5" fill="#60a5fa"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
</svg>
